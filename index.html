<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenOperator | High Performance Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 定义导航栏链接的基础样式和激活状态样式 */
        .nav-link { @apply px-4 py-2 text-gray-600 hover:text-blue-600 font-medium transition-colors; }
        .nav-active { @apply text-blue-600 border-b-2 border-blue-600; }
        
        /* 通用卡片样式 */
        .card { @apply bg-white border border-gray-200 rounded-lg shadow-sm; }
        
        /* 代码块样式：保持深色背景以提高可读性，适合程序员习惯 */
        pre { @apply bg-gray-900 text-gray-100 p-4 rounded-lg overflow-x-auto font-mono text-sm leading-relaxed; }
        code { font-family: 'Fira Code', monospace; }
        
        /* 强制覆盖 Tailwind 默认的 focus 环颜色为蓝色 */
        :focus { outline: 2px solid transparent; outline-offset: 2px; --tw-ring-inset: var(--tw-empty,/*!*/ /*!*/); --tw-ring-offset-width: 0px; --tw-ring-offset-color: #fff; --tw-ring-color: #2563eb; --tw-ring-opacity: 0.5; box-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-16">
            <div class="flex items-center gap-8">
                <a href="#" onclick="showView('leaderboard')" class="text-xl font-bold tracking-tighter">Open<span class="text-blue-600">Operator</span></a>
                <div class="hidden md:flex gap-4">
                    <a href="javascript:void(0)" onclick="showView('problems')" class="nav-link">Problems</a>
                    <a href="javascript:void(0)" onclick="showView('leaderboard')" class="nav-link nav-active" id="nav-lb">Leaderboard</a>
                </div>
            </div>
            <div id="update-ts" class="text-xs text-gray-400 font-mono"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section id="view-leaderboard" class="view-content">
            <h2 class="text-2xl font-bold mb-6">Global Leaderboard</h2>
            <div class="card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase">Task Name</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase">Top Performer</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-600 uppercase text-right">Best Score</th>
                        </tr>
                    </thead>
                    <tbody id="global-lb-body" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="view-problems" class="view-content hidden">
            <h2 class="text-2xl font-bold mb-6">Problems</h2>
            <div class="grid gap-4" id="problem-list"></div>
        </section>

        <section id="view-task-detail" class="view-content hidden">
            <div id="task-detail-content"></div>
        </section>
        
    </main>

    <footer class="max-w-6xl mx-auto px-4 py-10 text-center text-gray-400 text-sm border-t border-gray-100 mt-12">
        &copy; 2026 OpenOperator Project. Hosted on GitHub Pages.
    </footer>

    <script>
        // 全局数据存储
        let db = { tasks: [] };

        // 页面初始化：加载数据并根据 URL 参数渲染视图
        async function init() {
            try {
                // 读取同目录下的 data.json
                const res = await fetch('./data.json');
                if (!res.ok) throw new Error('Network response was not ok');
                db = await res.json();
                
                // 更新顶部时间戳
                document.getElementById('update-ts').innerText = `Last Update: ${db.last_updated}`;
                
                // 预渲染静态部分
                renderGlobalLeaderboard();
                renderProblemList();
                
                // 处理 URL 路由 (例如 ?task=T001)
                const params = new URLSearchParams(window.location.search);
                const taskId = params.get('task');
                if (taskId) {
                    showTaskDetail(taskId);
                } else {
                    showView('leaderboard'); // 默认显示总榜
                }
            } catch (e) {
                console.error("Data load error:", e);
                document.body.innerHTML = `<div class="text-center py-20 text-red-600"><h1>Error Loading Data</h1><p>Make sure data.json exists and is valid.</p></div>`;
            }
        }

        // 切换主视图 (leaderboard / problems / task-detail)
        function showView(viewId) {
            // 隐藏所有视图内容
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            // 显示目标视图
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            
            // 更新导航栏激活状态
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('nav-active'));
            if (viewId === 'leaderboard') document.getElementById('nav-lb').classList.add('nav-active');
            if (viewId === 'problems') document.querySelector('[onclick="showView(\'problems\')"]').classList.add('nav-active');

            // 如果不是详情页，清空 URL 参数
            if(viewId !== 'task-detail') {
                window.history.pushState({}, '', window.location.pathname);
            }
        }

        // 渲染总排行榜
        function renderGlobalLeaderboard() {
            const container = document.getElementById('global-lb-body');
            if (!db.tasks || db.tasks.length === 0) {
                container.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-gray-500">No tasks defined.</td></tr>`;
                return;
            }

            container.innerHTML = db.tasks.map(task => {
                // 获取第一名数据，如果没有则显示默认值
                const top = task.results && task.results.length > 0 
                    ? task.results[0] 
                    : { user: 'N/A', github: 'none', score: '-' };
                
                return `
                    <tr class="hover:bg-blue-50 cursor-pointer transition-colors" onclick="showTaskDetail('${task.id}', 'leaderboard')">
                        <td class="px-6 py-4 font-medium text-blue-700">${task.name}</td>
                        <td class="px-6 py-4 text-sm">@${top.github}</td>
                        <td class="px-6 py-4 text-right font-mono font-bold">${top.score.toFixed(6)}</td>
                    </tr>
                `;
            }).join('');
        }

        // 渲染题目列表
        function renderProblemList() {
            const container = document.getElementById('problem-list');
            if (!db.tasks || db.tasks.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-gray-500">No problems available.</p>`;
                return;
            }

            container.innerHTML = db.tasks.map(task => `
                <div class="card p-6 hover:border-blue-400 cursor-pointer transition-all" onclick="showTaskDetail('${task.id}', 'info')">
                    <h3 class="text-lg font-bold text-gray-800">${task.name}</h3>
                    <p class="text-gray-500 text-sm mt-1 truncate">${task.description.workload}</p>
                </div>
            `).join('');
        }

        // 渲染题目详情页 (SPA 逻辑)
        // taskId: 题目 ID (如 T001)
        // subView: 初始显示的子标签页 ('info' 或 'leaderboard')
        function showTaskDetail(taskId, subView = 'info') {
            const task = db.tasks.find(t => t.id === taskId);
            if (!task) {
                alert('Task not found');
                showView('leaderboard');
                return;
            }

            // 切换到详情视图
            showView('task-detail');
            // 更新 URL 参数，支持分享链接
            window.history.pushState({}, '', `?task=${taskId}`);

            const content = document.getElementById('task-detail-content');
            
            // 渲染详情页 HTML 结构
            content.innerHTML = `
                <nav class="flex gap-2 text-sm text-gray-500 mb-4">
                    <a href="javascript:void(0)" onclick="showView('leaderboard')" class="hover:text-blue-600">Leaderboard</a>
                    <span>/</span>
                    <span class="text-gray-900">${task.name}</span>
                </nav>
                
                <h1 class="text-3xl font-bold mb-8 cursor-pointer hover:text-blue-600" onclick="showTaskDetail('${task.id}', 'info')">
                    ${task.name}
                </h1>

                <div class="flex gap-6 border-b border-gray-200 mb-8">
                    <button onclick="toggleSubView('info')" id="btn-info" class="pb-2 border-b-2 font-medium transition-colors ${subView==='info'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-blue-600'}">Description</button>
                    <button onclick="toggleSubView('lb')" id="btn-lb" class="pb-2 border-b-2 font-medium transition-colors ${subView==='leaderboard'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-blue-600'}">Leaderboard</button>
                </div>

                <div id="sub-info" class="${subView==='info'?'':'hidden'} space-y-8">
                    <div class="card p-6">
                        <h4 class="font-bold text-gray-400 uppercase text-xs mb-4 tracking-widest">Description</h4>
                        <div class="grid md:grid-cols-2 gap-8">
                            <div>
                                <p class="text-sm font-semibold text-gray-500 uppercase">Input</p>
                                <code class="block bg-gray-100 p-2 rounded mt-2 text-sm text-gray-800">${task.description.input}</code>
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-gray-500 uppercase">Output</p>
                                <code class="block bg-gray-100 p-2 rounded mt-2 text-sm text-gray-800">${task.description.output}</code>
                            </div>
                        </div>
                        <div class="mt-6">
                            <p class="text-sm font-semibold text-gray-500 uppercase">Workload</p>
                            <p class="mt-2 text-gray-700">${task.description.workload}</p>
                        </div>
                    </div>
                    
                    <div class="card p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-gray-400 uppercase text-xs tracking-widest">Reference Implementation</h4>
                            <button onclick="copyCode()" class="text-xs bg-blue-50 text-blue-700 hover:bg-blue-100 px-3 py-1 rounded font-medium transition-colors">Copy Code</button>
                        </div>
                        <pre><code id="code-block">${escapeHtml(task.reference_implementation)}</code></pre>
                    </div>
                </div>

                <div id="sub-lb" class="${subView==='leaderboard'?'':'hidden'}">
                    <div class="card overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b border-gray-200 text-xs font-bold text-gray-500 uppercase tracking-wider">
                                <tr>
                                    <th class="px-6 py-3">Rank</th>
                                    <th class="px-6 py-3">User</th>
                                    <th class="px-6 py-3">Score</th>
                                    <th class="px-6 py-3">Latency</th>
                                    <th class="px-6 py-3">Submitted</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${task.results.map(r => `
                                    <tr>
                                        <td class="px-6 py-4 font-bold text-gray-400">#${r.rank}</td>
                                        <td class="px-6 py-4 font-medium text-blue-600">@${r.github}</td>
                                        <td class="px-6 py-4 font-mono font-bold text-gray-900">${r.score.toFixed(6)}</td>
                                        <td class="px-6 py-4 text-sm text-gray-500">${r.latency}</td>
                                        <td class="px-6 py-4 text-sm text-gray-400">${r.date}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // HTML 安全转义函数：防止代码中的 < > 符号破坏页面结构
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 一键复制代码功能
        function copyCode() {
            const code = document.getElementById('code-block').textContent;
            navigator.clipboard.writeText(code).then(() => {
                // 简单的成功反馈
                const btn = document.querySelector('[onclick="copyCode()"]');
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.replace('bg-blue-50', 'bg-green-50');
                btn.classList.replace('text-blue-700', 'text-green-700');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-green-50', 'bg-blue-50');
                    btn.classList.replace('text-green-700', 'text-blue-700');
                }, 1500);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert('Failed to copy code. Please check browser permissions.');
            });
        }

        // 切换题目详情页内的子标签页
        function toggleSubView(type) {
            const isInfo = type === 'info';
            document.getElementById('sub-info').classList.toggle('hidden', !isInfo);
            document.getElementById('sub-lb').classList.toggle('hidden', isInfo);
            
            // 更新按钮样式
            const activeClass = "pb-2 border-b-2 border-blue-600 text-blue-600 font-medium";
            const inactiveClass = "pb-2 border-b-2 border-transparent text-gray-500 hover:text-blue-600 font-medium";
            
            document.getElementById('btn-info').className = isInfo ? activeClass : inactiveClass;
            document.getElementById('btn-lb').className = !isInfo ? activeClass : inactiveClass;
        }

        // 页面加载完成后执行初始化
        window.onload = init;
    </script>
</body>
</html>
