<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | SOL-ExecBench Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-border {
            border-bottom: 2px solid;
            border-image: linear-gradient(to right, #76b900, #34d399) 1;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans leading-normal">

    <header class="bg-white shadow-sm py-8 mb-10">
        <div class="max-w-5xl mx-auto px-4">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">SOL-ExecBench <span class="text-green-600">Leaderboard</span></h1>
            <p class="mt-2 text-gray-600">Performance results for high-performance computing tasks.</p>
            <p id="update-time" class="text-sm text-gray-400 mt-1">Last updated: --</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        <div class="bg-white shadow-xl rounded-lg overflow-hidden border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200 text-left">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Task Name</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Top Performer (GitHub)</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Best Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="3" class="px-6 py-10 text-center text-gray-400">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="max-w-5xl mx-auto px-4 py-10 text-center text-gray-400 text-sm">
        &copy; 2024 Your Project Name. Hosted on GitLab Pages.
    </footer>

    <script>
        // 异步加载数据
        async function loadLeaderboard() {
            try {
                // 读取同目录下的 data.json
                const response = await fetch('./data.json');
                const data = await response.json();
                
                const tableBody = document.getElementById('leaderboard-body');
                const updateTime = document.getElementById('update-time');
                
                updateTime.innerText = `Last updated: ${data.last_updated}`;
                tableBody.innerHTML = ''; // 清空加载提示

                data.leaderboard.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-green-50 transition-colors";
                    
                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium text-gray-800">${item.task_name}</td>
                        <td class="px-6 py-4">
                            <a href="https://github.com/${item.github_handle}" target="_blank" class="flex items-center text-blue-600 hover:underline">
                                <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                @${item.github_handle}
                            </a>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <span class="font-mono font-bold text-gray-900">${item.score}</span>
                            <span class="text-xs text-gray-500 ml-1">${item.unit}</span>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('leaderboard-body').innerHTML = '<tr><td colspan="3" class="text-center py-10 text-red-500">Failed to load data. Please check data.json.</td></tr>';
            }
        }

        window.onload = loadLeaderboard;
    </script>
</body>
</html>
